<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>サイエンス・ケミカルクエスト</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 【重要】環境制限で真っ白になるのを防ぐ強制リセット */
    html, body {
      width: 100%; height: 100%; margin: 0; padding: 0;
      background-color: #111827 !important; color: #ffffff !important;
      overflow: hidden; overscroll-behavior: none; font-family: sans-serif;
    }

    #app-wrapper {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #111827; display: flex; justify-content: center; align-items: center; overflow: hidden;
    }

    #game-container {
      width: 100%; max-width: 768px; height: 100%;
      background-color: #1f2937 !important; position: relative; display: flex; flex-direction: column; overflow: hidden;
    }

    .screen-bg { background-color: #111827 !important; }
    .overlay-bg { background-color: rgba(0, 0, 0, 0.85) !important; }

    /* アニメーション群 */
    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
      40%, 60% { transform: translate3d(6px, 0, 0); }
    }

    .hit { animation: hit 0.1s ease-in-out; filter: brightness(1.5) sepia(1) hue-rotate(-50deg) saturate(3); }
    @keyframes hit {
      0% { transform: scale(1) translate(0,0); }
      50% { transform: scale(0.9) translate(10px, -10px); }
      100% { transform: scale(1) translate(0,0); }
    }

    .dmg-popup {
      position: absolute; font-weight: bold; color: #fbbf24; text-shadow: 2px 2px 0 #000;
      animation: floatUp 0.5s ease-out forwards; pointer-events: none; z-index: 60;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
    }

    .chest-drop { animation: chestDrop 1s ease-out forwards; }
    @keyframes chestDrop {
      0% { transform: translateY(-300px) scale(0.5); opacity: 0; }
      60% { transform: translateY(20px) scale(1.1); opacity: 1; }
      80% { transform: translateY(-10px) scale(0.95); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    
    .gacha-shake { animation: gachaShake 0.4s ease-in-out infinite; }
    @keyframes gachaShake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
    }
    
    .gacha-pop { animation: gachaPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes gachaPop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* 元素図鑑のキラキラ動くアニメーション */
    @keyframes shineAndFloat {
      0% { box-shadow: 0 0 5px #60a5fa, 0 0 10px #60a5fa; transform: translateY(0); }
      50% { box-shadow: 0 0 15px #34d399, 0 0 25px #34d399; transform: translateY(-4px); }
      100% { box-shadow: 0 0 5px #60a5fa, 0 0 10px #60a5fa; transform: translateY(0); }
    }
    .element-shiny {
      animation: shineAndFloat 2s infinite alternate ease-in-out;
      border: 2px solid #60a5fa !important;
      background: linear-gradient(135deg, #1f2937, #374151);
    }

    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>

  <div id="app-wrapper">
    <div id="game-container" class="shadow-2xl">
      
      <div class="absolute top-4 left-4 z-[100] flex items-center bg-gray-900/80 px-4 py-2 rounded-full border border-yellow-500 shadow-md">
        <span class="text-yellow-400 font-bold text-xl mr-2">🪙</span>
        <span id="global-coins" class="text-white font-bold text-lg md:text-xl">0</span>
      </div>

      <button onclick="openMenu()" class="absolute top-4 right-4 z-[100] p-2 bg-gray-800 rounded-lg border border-gray-500 shadow-lg active:scale-95 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <!-- メニュー -->
      <div id="side-menu" class="hidden absolute inset-0 z-[110] overlay-bg flex flex-col items-center justify-center p-6">
        <div class="bg-gray-800 border-2 border-gray-600 rounded-2xl p-6 w-full max-w-sm flex flex-col gap-4 text-center shadow-2xl">
          <h3 class="text-3xl font-extrabold text-white mb-2">MENU</h3>
          <button onclick="toggleMute()" id="btn-mute" class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 py-4 rounded-xl font-bold text-xl shadow-md transition-transform">🎵 BGM: ON</button>
          <button onclick="showCollectionFromMenu()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 py-4 rounded-xl font-bold text-xl shadow-md transition-transform">🧪 元素コレクション</button>
          <button onclick="backToTitleFromMenu()" class="bg-red-600 hover:bg-red-500 active:scale-95 py-4 rounded-xl font-bold text-xl shadow-md transition-transform">🏠 タイトルへ戻る</button>
          <button onclick="closeMenu()" class="mt-4 text-gray-400 hover:text-white underline py-2 text-lg active:scale-95 transition-transform">閉じる</button>
        </div>
      </div>

      <!-- タイトル画面 -->
      <div id="screen-title" class="absolute inset-0 z-50 screen-bg flex flex-col items-center justify-center p-6 text-center overflow-y-auto">
        <div class="my-auto w-full flex flex-col items-center">
          <p class="text-yellow-400 font-bold mb-2">超難関！全10ステージ (各5問)</p>
          <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-2 drop-shadow-lg leading-tight">
            ケミカル・クエスト<br><span class="text-2xl md:text-3xl text-yellow-300">〜化学の試練〜</span>
          </h1>
          <p class="text-sm md:text-base text-gray-300 mb-10 font-bold">記述・複合問題あり！正解して<span class="text-red-400">連打</span>でAPを稼ごう！</p>
          
          <div class="flex flex-col gap-4 w-full max-w-sm">
            <button onclick="startGame()" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition-transform text-white font-bold py-4 rounded-2xl text-2xl shadow-[0_0_15px_rgba(16,185,129,0.5)]">
              試練に挑む (START)
            </button>
            <button onclick="showCollection()" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-transform text-white font-bold py-4 rounded-2xl text-xl shadow-lg flex justify-center items-center gap-2">
              🧪 元素コレクション
            </button>
          </div>
        </div>
      </div>

      <!-- コレクション画面 -->
      <div id="screen-collection" class="hidden absolute inset-0 z-50 screen-bg flex flex-col items-center p-6 text-center overflow-y-auto pt-20">
        <h2 class="text-2xl md:text-3xl font-bold text-blue-400 mb-2 shrink-0">元素コレクション</h2>
        <p class="text-gray-300 font-bold mb-6">全20種類を集めよう！</p>
        
        <button onclick="drawGacha()" class="bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 active:scale-95 transition-transform text-white font-extrabold py-4 px-8 rounded-full text-xl shadow-[0_0_15px_rgba(234,179,8,0.5)] mb-6 shrink-0 border-2 border-yellow-300">
          100🪙 で元素を抽出する
        </button>

        <div id="collection-grid" class="grid grid-cols-4 md:grid-cols-5 gap-3 w-full max-w-xl mb-8 shrink-0 py-4">
          <!-- JSで生成 -->
        </div>
        <button onclick="hideCollection()" class="bg-gray-600 hover:bg-gray-500 active:scale-95 transition-transform text-white font-bold py-3 px-10 rounded-xl text-lg shadow-lg mt-auto mb-8 shrink-0">戻る</button>
      </div>

      <!-- ガチャ演出オーバーレイ -->
      <div id="gacha-overlay" class="hidden absolute inset-0 z-[120] overlay-bg flex flex-col items-center justify-center p-6 text-center">
        <div id="gacha-flask" class="text-8xl md:text-[120px] mb-8">🧪</div>
        <div id="gacha-result" class="hidden flex-col items-center">
          <div id="gacha-result-icon" class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-emerald-300 mb-2 drop-shadow-lg">Na</div>
          <div id="gacha-result-name" class="text-2xl font-bold text-yellow-400 mb-2">ナトリウム</div>
          <div id="gacha-result-msg" class="text-lg text-white font-bold bg-red-500 px-4 py-1 rounded-full mb-8">NEW!</div>
        </div>
        <button id="gacha-close-btn" onclick="closeGacha()" class="hidden bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-3 px-10 rounded-xl text-xl shadow-lg">OK</button>
      </div>

      <!-- 宝箱演出オーバーレイ -->
      <div id="chest-overlay" class="hidden absolute inset-0 z-[60] overlay-bg flex flex-col items-center justify-center p-6 text-center">
        <h2 id="chest-title" class="text-3xl md:text-5xl font-extrabold text-yellow-400 mb-8 drop-shadow-md">中ボス撃破！宝箱出現！</h2>
        <button id="chest-box" onclick="openChest()" class="text-8xl md:text-[150px] mb-8 chest-drop transition-transform hover:scale-110 active:scale-95">🎁</button>
        <p id="chest-inst" class="text-xl text-white font-bold animate-pulse">タップして開ける！</p>
      </div>

      <!-- バトル画面 -->
      <div id="screen-battle" class="hidden h-full flex flex-col relative w-full">
        <div class="absolute top-16 left-4 z-10 font-bold text-yellow-300 text-sm md:text-base drop-shadow-md bg-black/50 px-3 py-1 rounded-full border border-gray-600">
          AP: <span id="total-ap-display">0</span>
        </div>

        <div class="flex justify-between items-center p-4 pt-16 bg-gray-900 border-b border-gray-700 h-28 shrink-0">
          <div class="flex flex-col w-1/3">
            <span class="text-[10px] md:text-xs text-blue-300 font-bold mb-1">あなた HP: <span id="player-hp-text">3/3</span></span>
            <div class="w-full bg-gray-700 rounded-full h-2 md:h-3 border border-gray-600">
              <div id="player-hp-bar" class="bg-blue-500 h-full rounded-full transition-all duration-300" style="width: 100%"></div>
            </div>
          </div>
          <div class="text-center px-2">
            <div id="stage-name" class="text-xs md:text-sm font-bold text-yellow-400">ステージ 1</div>
            <div id="question-count" class="text-[10px] md:text-xs text-gray-400">1問目</div>
          </div>
          <div class="flex flex-col w-1/3 items-end">
            <span class="text-[10px] md:text-xs text-purple-300 font-bold mb-1"><span id="enemy-name-display">モンスター</span> HP: <span id="enemy-hp-text">1000</span></span>
            <div class="w-full bg-gray-700 rounded-full h-2 md:h-3 border border-gray-600 flex justify-end">
              <div id="enemy-hp-bar" class="bg-red-500 h-full rounded-full transition-all duration-300" style="width: 100%"></div>
            </div>
          </div>
        </div>

        <div id="battle-main-area" class="flex-1 min-h-0 flex flex-col items-center justify-start p-4 md:p-6 relative overflow-y-auto w-full">
          <div class="mt-2 w-full max-w-xl flex flex-col items-center">
            <div id="enemy-sprite" class="text-6xl md:text-[100px] mb-4 drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] transition-transform flex justify-center z-10 shrink-0">💧</div>
            
            <!-- 問題文（長文対策でスクロール可能に） -->
            <div class="bg-gray-700 border-2 border-gray-400 p-4 rounded-2xl w-full shadow-lg relative min-h-[90px] max-h-[140px] overflow-y-auto flex items-center justify-center z-10 mb-4 shrink-0">
              <h2 id="question-text" class="text-sm md:text-lg font-bold text-center leading-relaxed">問題文がここに入ります</h2>
            </div>
            
            <div class="w-full bg-gray-900 rounded-full h-3 mb-4 border border-gray-500 shrink-0 z-10">
              <div id="timer-bar" class="bg-green-500 h-full rounded-full w-full"></div>
            </div>

            <!-- 回答ボタン -->
            <div id="choices-container" class="grid grid-cols-2 gap-2 md:gap-3 w-full shrink-0 z-10">
            </div>
          </div>
          <div class="h-24 md:h-32 w-full shrink-0"></div>
        </div>

        <div id="rush-overlay" class="hidden absolute inset-0 z-30 flex flex-col items-center justify-center overlay-bg">
          <h2 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-400 animate-pulse mb-6 drop-shadow-md italic tracking-wider">
            RUSH TIME!!
          </h2>
          <p class="text-2xl text-white font-bold mb-4 bg-black/50 px-4 py-2 rounded-full border border-gray-500">残り時間: <span id="rush-timer" class="text-red-400">3.00</span> 秒</p>
          <button id="btn-rush" class="relative w-48 h-48 md:w-64 md:h-64 rounded-full bg-gradient-to-br from-red-500 to-orange-600 border-8 border-red-300 shadow-[0_0_30px_rgba(255,0,0,0.8)] active:scale-90 active:from-red-600 active:to-orange-700 transition-transform flex items-center justify-center text-4xl font-black text-white shrink-0">
            TAP!!
          </button>
          <p class="mt-6 text-base font-bold text-gray-200 bg-black/50 px-4 py-2 rounded-lg">連打でAPを稼げ！（APはコインに変換）</p>
        </div>
      </div>

      <!-- モーダル -->
      <div id="modal-overlay" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center p-6 overlay-bg">
        <div class="bg-gray-800 border-2 border-gray-400 rounded-2xl p-6 md:p-8 w-full max-w-md flex flex-col items-center text-center shadow-2xl relative overflow-hidden">
          <h2 id="modal-title" class="text-3xl md:text-4xl font-extrabold mb-2 relative z-10"></h2>
          <p id="modal-subtitle" class="text-base md:text-lg text-gray-200 mb-2 font-bold relative z-10 whitespace-pre-wrap"></p>
          
          <div id="modal-ap-display" class="hidden text-base md:text-lg text-yellow-300 font-bold mb-4 relative z-10 bg-gray-900 px-4 py-2 rounded-full border border-yellow-500">
            獲得コイン: +0🪙
          </div>
          
          <div id="modal-exp-container" class="bg-gray-900 p-4 rounded-lg w-full mb-6 border border-gray-500 text-left relative z-10 max-h-48 overflow-y-auto">
            <span class="text-sm text-emerald-400 font-bold mb-1 block">💡 解説</span>
            <p id="modal-exp" class="text-sm md:text-base text-gray-100 leading-relaxed"></p>
          </div>
          
          <button id="modal-btn" onclick="nextAction()" class="relative z-10 bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-4 w-full rounded-xl text-xl transition-transform shadow-lg shrink-0">
            次へ
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==========================================
    // データ管理（コイン・元素）
    // ==========================================
    let playerCoins = parseInt(localStorage.getItem('chemicalQuestCoins')) || 0;
    let unlockedElements = JSON.parse(localStorage.getItem('chemicalQuestElements')) || [];

    const elementsData = [
      { no: 1, sym: "H", name: "水素" }, { no: 2, sym: "He", name: "ヘリウム" },
      { no: 3, sym: "Li", name: "リチウム" }, { no: 4, sym: "Be", name: "ベリリウム" },
      { no: 5, sym: "B", name: "ホウ素" }, { no: 6, sym: "C", name: "炭素" },
      { no: 7, sym: "N", name: "窒素" }, { no: 8, sym: "O", name: "酸素" },
      { no: 9, sym: "F", name: "フッ素" }, { no: 10, sym: "Ne", name: "ネオン" },
      { no: 11, sym: "Na", name: "ナトリウム" }, { no: 12, sym: "Mg", name: "マグネシウム" },
      { no: 13, sym: "Al", name: "アルミニウム" }, { no: 14, sym: "Si", name: "ケイ素" },
      { no: 15, sym: "P", name: "リン" }, { no: 16, sym: "S", name: "硫黄" },
      { no: 17, sym: "Cl", name: "塩素" }, { no: 18, sym: "Ar", name: "アルゴン" },
      { no: 19, sym: "K", name: "カリウム" }, { no: 20, sym: "Ca", name: "カルシウム" },
      { no: 26, sym: "Fe", name: "鉄" }, { no: 29, sym: "Cu", name: "銅" }, { no: 47, sym: "Ag", name: "銀" }
    ];

    function saveGameData() {
      localStorage.setItem('chemicalQuestCoins', playerCoins);
      localStorage.setItem('chemicalQuestElements', JSON.stringify(unlockedElements));
      document.getElementById('global-coins').innerText = playerCoins;
    }
    document.getElementById('global-coins').innerText = playerCoins;

    // ==========================================
    // 🎵 Web Audio API BGM & SE
    // ==========================================
    const SoundEngine = (function() {
      let ctx = null; let isPlaying = false; let currentStageIndex = 0; let isMuted = false; let timerId = null;
      function mtof(m) { return 440 * Math.pow(2, (m - 69) / 12); }
      const tracks = [
        { t: 150, w: 'square', s: [60, 64, 67, 72, 67, 64, 60, 55] }, { t: 120, w: 'triangle', s: [60, 63, 67, 63, 59, 62, 67, 62] },
        { t: 180, w: 'square', s: [72, 72, 60, 60, 67, 67, 60, 60] }, { t: 140, w: 'sawtooth', s: [55, 62, 67, 74, 67, 62, 55, 50] },
        { t: 110, w: 'sawtooth', s: [36, 48, 36, 48, 35, 47, 35, 47] }, { t: 160, w: 'square', s: [69, 72, 76, 81, 76, 72, 69, 64] },
        { t: 130, w: 'triangle', s: [62, 65, 69, 74, 69, 65, 62, 57] }, { t: 170, w: 'sawtooth', s: [60, 72, 60, 72, 59, 71, 59, 71] },
        { t: 120, w: 'sawtooth', s: [40, 43, 47, 43, 39, 42, 46, 42] }, { t: 80,  w: 'square', s: [48, 0, 49, 0, 50, 0, 49, 0] }
      ];
      let step = 0;
      function playLoop() {
        if(!isPlaying) return;
        const track = tracks[currentStageIndex % tracks.length]; const note = track.s[step % track.s.length];
        if (note > 0 && !isMuted && ctx) {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = track.w; osc.frequency.value = mtof(note); const noteLen = (60 / track.t) * 0.5;
          gain.gain.setValueAtTime(0.05, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + noteLen);
          osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + noteLen);
        }
        step++; timerId = setTimeout(playLoop, (60 / track.t) * 1000 * 0.5);
      }
      return {
        init: function() { if(!ctx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if(AudioContext) ctx = new AudioContext(); } if(ctx && ctx.state === 'suspended') ctx.resume(); },
        startBGM: function(stageIdx) { this.init(); currentStageIndex = stageIdx; step = 0; if(!isPlaying) { isPlaying = true; playLoop(); } },
        stopBGM: function() { isPlaying = false; clearTimeout(timerId); },
        toggleMute: function() { isMuted = !isMuted; return isMuted; },
        playSE: function(type) {
          if (isMuted || !ctx) return;
          const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); const t = ctx.currentTime;
          if (type === 'correct') { osc.type = 'sine'; osc.frequency.setValueAtTime(880, t); osc.frequency.setValueAtTime(1108, t + 0.1); gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3); osc.start(t); osc.stop(t + 0.3); }
          else if (type === 'wrong') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(100, t + 0.3); gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3); osc.start(t); osc.stop(t + 0.3); }
          else if (type === 'hit') { osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(40, t + 0.1); gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1); osc.start(t); osc.stop(t + 0.1); }
          else if (type === 'fanfare') { osc.type = 'square'; osc.frequency.setValueAtTime(523.25, t); osc.frequency.setValueAtTime(659.25, t+0.2); osc.frequency.setValueAtTime(783.99, t+0.4); gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 1.0); osc.start(t); osc.stop(t + 1.0); }
          else if (type === 'glass') { osc.type = 'triangle'; osc.frequency.setValueAtTime(2000, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.2); gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2); osc.start(t); osc.stop(t + 0.2); }
        }
      }
    })();

    // ==========================================
    // UI制御 ＆ 元素図鑑
    // ==========================================
    function openMenu() { document.getElementById('side-menu').classList.remove('hidden'); }
    function closeMenu() { document.getElementById('side-menu').classList.add('hidden'); }
    function toggleMute() {
      const isMuted = SoundEngine.toggleMute(); const btn = document.getElementById('btn-mute');
      if(isMuted) { btn.innerText = "🔇 BGM: OFF"; btn.classList.replace('bg-indigo-600', 'bg-gray-600'); }
      else { btn.innerText = "🎵 BGM: ON"; btn.classList.replace('bg-gray-600', 'bg-indigo-600'); SoundEngine.init(); }
    }
    function showCollectionFromMenu() { closeMenu(); document.getElementById('screen-battle').classList.add('hidden'); SoundEngine.stopBGM(); showCollection(); }
    function backToTitleFromMenu() { closeMenu(); isGameOver = true; SoundEngine.stopBGM(); document.getElementById('screen-battle').classList.add('hidden'); document.getElementById('screen-title').classList.remove('hidden'); clearInterval(timerInterval); }

    function showCollection() {
      SoundEngine.init(); document.getElementById('screen-title').classList.add('hidden'); document.getElementById('screen-collection').classList.remove('hidden'); renderCollection();
    }
    function hideCollection() { document.getElementById('screen-collection').classList.add('hidden'); document.getElementById('screen-title').classList.remove('hidden'); }

    function renderCollection() {
      const grid = document.getElementById('collection-grid'); grid.innerHTML = '';
      elementsData.forEach(el => {
        const hasEl = unlockedElements.includes(el.no);

    function drawGacha() {
      if (playerCoins < 100) { alert("コインが足りません！"); return; }
      playerCoins -= 100; saveGameData(); renderCollection();
      
      const overlay = document.getElementById('gacha-overlay'); const flask = document.getElementById('gacha-flask');
      const resultDiv = document.getElementById('gacha-result'); const btn = document.getElementById('gacha-close-btn');
      
      overlay.classList.remove('hidden'); flask.classList.remove('hidden'); flask.classList.add('gacha-shake');
      resultDiv.classList.add('hidden'); resultDiv.classList.remove('gacha-pop'); btn.classList.add('hidden');

      const hit = elementsData[Math.floor(Math.random() * elementsData.length)];
      const isNew = !unlockedElements.includes(hit.no);
      if(isNew) { unlockedElements.push(hit.no); saveGameData(); } else { playerCoins += 30; saveGameData(); } 

      setTimeout(() => {
        SoundEngine.playSE('glass'); flask.classList.remove('gacha-shake'); flask.classList.add('hidden');
        document.getElementById('gacha-result-icon').innerText = hit.sym; document.getElementById('gacha-result-name').innerText = hit.name;
        const msg = document.getElementById('gacha-result-msg');
        if(isNew) { msg.innerText = "NEW!"; msg.className = "text-lg text-white font-bold bg-red-500 px-4 py-1 rounded-full mb-8"; }
        else { msg.innerText = "カブリ... (30🪙 返還)"; msg.className = "text-lg text-white font-bold bg-gray-500 px-4 py-1 rounded-full mb-8"; }
        resultDiv.classList.remove('hidden'); resultDiv.classList.add('gacha-pop');
        setTimeout(() => { btn.classList.remove('hidden'); }, 800);
      }, 1500);
    }
    function closeGacha() { document.getElementById('gacha-overlay').classList.add('hidden'); renderCollection(); }

          { q: "複合穴埋め：酸化銅と炭素の反応で、酸化銅は(ア)され、炭素は(イ)される。この反応の式は 2CuO ＋ C → (ウ) Cu ＋ CO₂ となる。", choices: ["ア=酸化, イ=還元, ウ=1", "ア=還元, イ=酸化, ウ=2", "ア=分解, イ=化合, ウ=2", "ア=還元, イ=酸化, ウ=4"], ans: 1, exp: "酸素を奪われるのが還元、酸素と結びつくのが酸化です。銅は右辺で2つできるため係数は2になります。" },
          { q: "図表想定計算：銅粉 4.0g から酸化銅 5.0g ができる。銅 10.0g を完全に加熱すると質量は何 g 増加するか？", choices: ["1.0 g", "2.5 g", "12.5 g", "5.0 g"], ans: 1, exp: "銅4gで質量が1g増加（酸素1g）するので、銅10gなら 10 × (1/4) ＝ 2.5g の酸素が結びつき増加します。" },
          { q: "記述：木炭（炭素）が燃えると周囲の酸素と結びついて二酸化炭素になるが、燃えた後の木炭の質量は減る。なぜか？", choices: ["炭素が消滅するから", "発生した二酸化炭素が空気中に逃げてしまうから", "熱の分だけ軽くなるから", "木炭が縮むから"], ans: 1, exp: "気体になって空気中に散らばってしまうため、残った固体の質量は減少します。" }
        ]
      },
      {
        name: "ST 10: 化学の魔王", enemyIcon: "🦖", enemyName: "ゴジラ", maxHp: 12000, isBoss: true,
        questions: [
          { q: "複合記述：酸化銀の熱分解で、試験管の底に残った白い物質が「金属」であることを確かめる方法を2つ答えよ。", choices: ["水に溶かす、石灰水に入れる", "こすって光沢を出す、叩いて広げる", "火を近づける、匂いをかぐ", "塩酸を入れる、赤色リトマス紙を当てる"], ans: 1, exp: "金属の共通の性質である「金属光沢」「展性・延性（叩くと広がる）」または「電気を通す」ことを確認します。" },
          { q: "実験考察：鉄と硫黄の混合物が入った試験管の上部だけを加熱し、赤くなったら火を止めた。その後の反応はどうなるか？", choices: ["すぐに反応が止まる", "冷めるまでゆっくり進む", "火を止めても、発生した熱によって反応が最後まで進む", "爆発する"], ans: 2, exp: "鉄と硫黄の化合は発熱反応なので、自ら出した熱で次々と反応が進んでいきます。" },
          { q: "化学反応式完成：炭酸水素ナトリウムの熱分解。 2NaHCO₃ → ( ア ) ＋ ( イ ) ＋ H₂O", choices: ["ア=Na₂CO₃ , イ=CO₂", "ア=Na₂O , イ=CO₂", "ア=Na₂CO₃ , イ=O₂", "ア=NaCl , イ=CO"], ans: 0, exp: "テスト超頻出！炭酸ナトリウム（Na₂CO₃）、二酸化炭素（CO₂）、水（H₂O）の3つに分解されます。" },
          { q: "難問計算：銅粉 1.6g とマグネシウム粉末 1.2g をそれぞれ完全に酸化させた。できた酸化物の質量の合計は何 g か？", choices: ["2.8 g", "3.0 g", "4.0 g", "5.6 g"], ans: 2, exp: "銅(4:5)より酸化銅は 1.6×(5/4)＝2.0g。Mg(3:5)より酸化Mgは 1.2×(5/3)＝2.0g。合計で 4.0g になります。" },
          { q: "超重要記述：化学変化の前後で「質量保存の法則」が成り立つ理由を、『原子』という言葉を使って説明せよ。", choices: ["原子が新しくできるから", "原子の大きさが変わるから", "化学変化の前後で、原子の組み合わせは変わるが、原子の種類と数は変わらないから", "原子がすべて消えるから"], ans: 2, exp: "原子は新しくできたり、他の種類に変わったり、なくなったりしない（ドルトンの原子説）ため、全体の質量は保存されます。" }
        ]
      }
    ];

    // ==========================================
    // ゲーム進行ロジック
    // ==========================================
    let currentStageIndex = 0; let currentQuestionIndex = 0;
    let playerMaxHP = 3; let playerHP = 3; let enemyHP = 1000; let maxEnemyHP = 1000;
    let totalAP = 0; let earnedCoinsInRound = 0;
    let timerInterval; let timeLeft = 200; const MAX_TIME = 200;
    let currentQuestions = []; let isGameOver = false; let isStageClear = false;
    let isRushTime = false; let rushTimer = 3.0; let rushInterval;

    const UI = {
      title: document.getElementById('screen-title'), battle: document.getElementById('screen-battle'),
      modalOverlay: document.getElementById('modal-overlay'), modalTitle: document.getElementById('modal-title'),
      modalSubtitle: document.getElementById('modal-subtitle'), modalExp: document.getElementById('modal-exp'),
      modalBtn: document.getElementById('modal-btn'), playerHpText: document.getElementById('player-hp-text'),
      playerHpBar: document.getElementById('player-hp-bar'), enemyHpText: document.getElementById('enemy-hp-text'),
      enemyHpBar: document.getElementById('enemy-hp-bar'), stageName: document.getElementById('stage-name'),
      enemyName: document.getElementById('enemy-name-display'), questionCount: document.getElementById('question-count'),
      enemySprite: document.getElementById('enemy-sprite'), questionText: document.getElementById('question-text'),
      choicesContainer: document.getElementById('choices-container'), timerBar: document.getElementById('timer-bar'),
      totalApDisplay: document.getElementById('total-ap-display'), modalApDisplay: document.getElementById('modal-ap-display'),
      rushOverlay: document.getElementById('rush-overlay'), rushTimerText: document.getElementById('rush-timer'),
      btnRush: document.getElementById('btn-rush'), battleMainArea: document.getElementById('battle-main-area'),
      chestOverlay: document.getElementById('chest-overlay')
    };

    function startGame() {
      SoundEngine.init(); currentStageIndex = 0; playerHP = 3; totalAP = 0; UI.totalApDisplay.innerText = totalAP; isGameOver = false;
      UI.title.classList.add('hidden'); UI.battle.classList.remove('hidden');
      loadStage();
    }

    function loadStage() {
      const stage = stages[currentStageIndex]; maxEnemyHP = stage.maxHp; enemyHP = maxEnemyHP; isStageClear = false;
      currentQuestions = [...stage.questions].sort(() => Math.random() - 0.5); currentQuestionIndex = 0;
      UI.stageName.innerHTML = stage.name; UI.enemyName.innerHTML = stage.enemyName; UI.enemySprite.innerHTML = stage.enemyIcon;
      UI.enemySprite.style.animation = 'none'; UI.enemySprite.style.opacity = '1'; UI.enemySprite.style.transform = 'scale(1)';
      updateHPDisplay(); showQuestion(); SoundEngine.startBGM(currentStageIndex);
    }

    function showQuestion() {
      UI.questionCount.innerText = `第 ${currentQuestionIndex + 1} 問`;
      const qData = currentQuestions[currentQuestionIndex]; UI.questionText.innerHTML = qData.q;
      UI.choicesContainer.innerHTML = '';
      qData.choices.forEach((choiceHTML, index) => {
        const btn = document.createElement('button');
        // 選択肢の文字数が多い場合を考慮し text-xs md:text-base に微調整
        btn.className = "bg-slate-700 hover:bg-slate-600 active:bg-slate-500 border-2 border-slate-400 rounded-2xl p-2 md:p-3 text-xs md:text-base font-bold flex items-center justify-center transition-transform active:scale-95 shadow-md min-h-[60px] md:min-h-[80px] w-full text-white";
        btn.innerHTML = choiceHTML; btn.onclick = () => checkAnswer(index);
        UI.choicesContainer.appendChild(btn);
      });
      UI.battleMainArea.scrollTop = 0; startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval); timeLeft = MAX_TIME; updateTimerBar();
      timerInterval = setInterval(() => {
        timeLeft--; updateTimerBar();
        if (timeLeft <= 0) { clearInterval(timerInterval); handleTimeout(); }
      }, 100);
    }

    function updateTimerBar() {
      const percentage = (timeLeft / MAX_TIME) * 100; UI.timerBar.style.width = `${percentage}%`;
      if (percentage > 50) UI.timerBar.className = "bg-green-500 h-full rounded-full transition-all duration-75";
      else if (percentage > 20) UI.timerBar.className = "bg-yellow-500 h-full rounded-full transition-all duration-75";
      else UI.timerBar.className = "bg-red-500 h-full rounded-full transition-all duration-75";
    }

    function handleTimeout() { disableButtons(); takeDamagePlayer(); showModal("TIME UP...", "時間切れ！ダメージを受けた！", currentQuestions[currentQuestionIndex].exp, false); }
    function disableButtons() { const buttons = UI.choicesContainer.querySelectorAll('button'); buttons.forEach(btn => { btn.disabled = true; btn.style.opacity = '0.5'; }); }

    function checkAnswer(selectedIndex) {
      clearInterval(timerInterval); disableButtons();
      const qData = currentQuestions[currentQuestionIndex];
      if (selectedIndex === qData.ans) { SoundEngine.playSE('correct'); startRushTime(qData.exp); } 
      else { takeDamagePlayer(); showModal("不正解...", "間違えた！ダメージを受けた！", qData.exp, false); }
    }

    function takeDamagePlayer() {
      playerHP--; SoundEngine.playSE('wrong');
      document.getElementById('app-wrapper').classList.add('shake');
      setTimeout(() => document.getElementById('app-wrapper').classList.remove('shake'), 400);
      updateHPDisplay();
    }

    function applyEnemyDamage(amount) {
      enemyHP -= amount; if (enemyHP < 0) enemyHP = 0;
      totalAP += amount; UI.totalApDisplay.innerText = totalAP;
      UI.enemySprite.classList.add('hit'); setTimeout(() => UI.enemySprite.classList.remove('hit'), 100);
      updateHPDisplay();
    }

    function updateHPDisplay() {
      UI.playerHpText.innerText = `${playerHP}/${playerMaxHP}`; UI.playerHpBar.style.width = `${(playerHP / playerMaxHP) * 100}%`;
      UI.enemyHpText.innerText = enemyHP; UI.enemyHpBar.style.width = `${(enemyHP / maxEnemyHP) * 100}%`;
    }

    // ==========================================
    // ラッシュタイム ＆ 報酬計算
    // ==========================================
    let currentExpText = ""; 
    function startRushTime(expText) {
      isRushTime = true; currentExpText = expText; rushTimer = 3.0;
      const baseDmg = Math.floor(100 + (timeLeft / 2)); applyEnemyDamage(baseDmg); showDamagePopup(baseDmg, true);
      UI.rushOverlay.classList.remove('hidden'); UI.rushTimerText.innerText = rushTimer.toFixed(2); UI.btnRush.onclick = handleRushTap;
      rushInterval = setInterval(() => {
        rushTimer -= 0.05;
        if (rushTimer <= 0) { rushTimer = 0; endRushTime(); }
        UI.rushTimerText.innerText = rushTimer.toFixed(2);
      }, 50);
    }

    function handleRushTap(e) {
      if(!isRushTime) return; SoundEngine.playSE('hit');
      const tapDmg = 30 + (currentStageIndex * 20); applyEnemyDamage(tapDmg);
      createDamagePopup(e, tapDmg);
    }

    function createDamagePopup(e, amount) {
      const popup = document.createElement('div'); popup.className = 'dmg-popup text-2xl md:text-4xl'; popup.innerText = `+${amount} AP`;
      const rect = UI.btnRush.getBoundingClientRect();
      const clientX = e.clientX || (rect.left + rect.width / 2); const clientY = e.clientY || (rect.top + rect.height / 2);
      popup.style.left = `${clientX - rect.left - 40}px`; popup.style.top = `${clientY - rect.top - 20}px`;
      UI.btnRush.appendChild(popup); setTimeout(() => popup.remove(), 500);
    }

    function showDamagePopup(amount, isBase=false) {
      const popup = document.createElement('div'); popup.className = `dmg-popup text-3xl md:text-5xl ${isBase ? 'text-emerald-400' : 'text-yellow-400'} z-[70]`; popup.innerText = isBase ? `正解! +${amount}` : `+${amount}`;
      const rect = UI.enemySprite.getBoundingClientRect(); const parentRect = UI.battleMainArea.getBoundingClientRect();
      popup.style.left = `${(rect.left - parentRect.left) + (rect.width / 2) - 50}px`; popup.style.top = `${(rect.top - parentRect.top) - 30}px`;
      UI.battleMainArea.appendChild(popup); setTimeout(() => popup.remove(), 600);
    }

    function endRushTime() {
      clearInterval(rushInterval); isRushTime = false; UI.rushOverlay.classList.add('hidden'); UI.btnRush.onclick = null;
      if(enemyHP <= 0) { handleWin(); } 
      else { earnedCoinsInRound = 0; showModal("RUSH FINISH!", `怒涛の連打でダメージを与えた！`, currentExpText, true); }
    }

    // ==========================================
    // 勝利演出（宝箱ドロップなど）
    // ==========================================
    function handleWin() {
      isStageClear = true; SoundEngine.stopBGM();
      const stage = stages[currentStageIndex];
      UI.enemySprite.style.animation = 'capture 1s ease-in-out forwards';
      
      let reward = 100; // 通常
      if(stage.enemyName === "キングコング") reward = 500;
      if(stage.enemyName === "キングギドラ") reward = 1000;
      if(stage.enemyName === "ゴジラ") reward = 3000;
      earnedCoinsInRound = reward;
      
      setTimeout(() => {
        if(stage.isBoss) {
          SoundEngine.playSE('fanfare');
          UI.chestOverlay.classList.remove('hidden');
        } else {
          playerCoins += reward; saveGameData();
          showModal("STAGE CLEAR!!", `${stage.enemyName} を撃破した！`, currentExpText, true, true);
        }
      }, 1000);
    }

    function openChest() {
      UI.chestOverlay.classList.add('hidden');
      playerCoins += earnedCoinsInRound; saveGameData();
      showModal("BOSS DEFEATED!!", `見事ボスを撃破し、宝箱からコインをゲット！`, currentExpText, true, true);
    }

    function showModal(title, subtitle, exp, isCorrect, isWin = false) {
      UI.modalTitle.innerText = title; UI.modalSubtitle.innerText = subtitle; UI.modalExp.innerHTML = exp;
      document.getElementById('modal-exp-container').scrollTop = 0;

      // 【誤爆防止】連打直後に誤って「次へ」を押さないよう、ボタンを1.5秒間ロック
      UI.modalBtn.disabled = true;
      UI.modalBtn.classList.add('opacity-50', 'cursor-not-allowed');
      setTimeout(() => {
        UI.modalBtn.disabled = false;
        UI.modalBtn.classList.remove('opacity-50', 'cursor-not-allowed');
      }, 1500);

      if (isWin) {
        UI.modalApDisplay.classList.remove('hidden');
        UI.modalApDisplay.innerText = `獲得コイン: +${earnedCoinsInRound}🪙`;
        UI.modalTitle.className = "text-3xl md:text-4xl font-extrabold mb-2 text-yellow-400 relative z-10 drop-shadow-md";
        UI.modalBtn.className = "relative z-10 bg-yellow-600 hover:bg-yellow-500 active:scale-95 text-white font-bold py-4 w-full rounded-xl text-xl transition-transform shadow-lg mt-2 shrink-0";
      } else if (isCorrect) {
        UI.modalApDisplay.classList.add('hidden');
        UI.modalTitle.className = "text-3xl md:text-4xl font-extrabold mb-2 text-emerald-400 relative z-10";
        UI.modalBtn.className = "relative z-10 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-4 w-full rounded-xl text-xl transition-transform shadow-lg mt-2 shrink-0";
      } else {
        UI.modalApDisplay.classList.add('hidden');
        UI.modalTitle.className = "text-3xl md:text-4xl font-extrabold mb-2 text-red-400 relative z-10";
        UI.modalBtn.className = "relative z-10 bg-red-600 hover:bg-red-500 active:scale-95 text-white font-bold py-4 w-full rounded-xl text-xl transition-transform shadow-lg mt-2 shrink-0";
      }

      if (playerHP <= 0) {
        isGameOver = true; SoundEngine.stopBGM();
        UI.modalSubtitle.innerText = "プレイヤーのHPがゼロになった...";
        UI.modalBtn.innerText = "タイトルへ戻る";
        UI.modalBtn.className = "relative z-10 bg-gray-600 hover:bg-gray-500 active:scale-95 text-white font-bold py-4 w-full rounded-xl text-xl transition-transform shadow-lg mt-2 shrink-0";
      } else if (isStageClear) {
        if (currentStageIndex >= stages.length - 1) {
          UI.modalTitle.innerText = "ALL CLEAR!!!";
          UI.modalTitle.className = "text-4xl md:text-5xl font-extrabold mb-2 text-yellow-400 relative z-10 animate-bounce mt-4";
          UI.modalSubtitle.innerText = `伝説のゴジラを撃破し、完全クリア！\n獲得したコインで元素ガチャを回そう！`;
          UI.modalBtn.innerText = "タイトルへ戻る";
        } else { UI.modalBtn.innerText = "次のステージへ"; }
      } else { UI.modalBtn.innerText = "次の問題へ"; }

      setTimeout(() => { UI.modalOverlay.classList.remove('hidden'); }, 500); 
    }

    function nextAction() {
      UI.modalOverlay.classList.add('hidden');
      if (isGameOver || (isStageClear && currentStageIndex >= stages.length - 1)) {
        document.getElementById('screen-battle').classList.add('hidden');
        document.getElementById('screen-title').classList.remove('hidden');
      } else if (isStageClear) {
        currentStageIndex++; loadStage();
      } else {
        currentQuestionIndex++; if (currentQuestionIndex >= currentQuestions.length) currentQuestionIndex = 0; showQuestion();
      }
    }
  </script>
</body>
</html>
