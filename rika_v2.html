<script>
const TEST_TIME = 30 * 60;
const STORAGE_KEY = 'science2026_midterm_5sets_progress_v1';
const RESULT_KEY = 'science2026_midterm_5sets_results_v1';
const tests = [{"id":"test1","title":"第1回 基礎確認テスト","description":"化学変化の実験、原子・分子、基本の化学式、地震の基礎を広く確認します。","questions":[{"id":"t1q1","category":"化学変化・実験","prompt":"資料の実験で、石灰水を白くにごらせた気体は何か。","answer":["二酸化炭素","CO2","二酸化炭素（CO2）"],"points":5,"type":"text","explanation":"石灰水を白くにごらせる気体は二酸化炭素です。炭酸水素ナトリウムを加熱すると二酸化炭素が発生します。","memory":"石灰水が「白くにごる」は、CO2が「こんにちは」。","compare":"text","material":"\n<div class=\"material-card\">\n  <div class=\"material-title\">資料：炭酸水素ナトリウムを加熱したときの変化</div>\n  <div class=\"flex-material\">\n    <div class=\"mini-diagram\">\n      <svg viewBox=\"0 0 340 180\" role=\"img\" aria-label=\"炭酸水素ナトリウムを加熱し、気体を石灰水に通す装置\">\n        <rect x=\"20\" y=\"130\" width=\"55\" height=\"12\" rx=\"3\" fill=\"#ddd\" stroke=\"#333\"/>\n        <path d=\"M45 128 L70 55 L235 55\" fill=\"none\" stroke=\"#333\" stroke-width=\"4\"/>\n        <rect x=\"82\" y=\"38\" width=\"105\" height=\"32\" rx=\"14\" fill=\"#fff\" stroke=\"#333\"/>\n        <text x=\"95\" y=\"59\" font-size=\"13\">NaHCO3</text>\n        <path d=\"M185 55 C230 50,230 96,260 96\" fill=\"none\" stroke=\"#333\" stroke-width=\"3\"/>\n        <rect x=\"255\" y=\"78\" width=\"45\" height=\"75\" fill=\"#fff\" stroke=\"#333\"/>\n        <rect x=\"258\" y=\"124\" width=\"39\" height=\"25\" fill=\"#dff\" stroke=\"none\"/>\n        <text x=\"257\" y=\"168\" font-size=\"12\">石灰水</text>\n        <path d=\"M103 92 q22 35 44 0\" stroke=\"#d66\" stroke-width=\"4\" fill=\"none\"/>\n        <text x=\"82\" y=\"115\" font-size=\"12\">加熱</text>\n        <text x=\"210\" y=\"42\" font-size=\"12\">発生した気体</text>\n      </svg>\n    </div>\n    <ul class=\"material-list\">\n      <li>気体を石灰水に通すと白くにごった。</li>\n      <li>試験管の口近くについた液体で青色の塩化コバルト紙が赤色に変化した。</li>\n      <li>加熱後に残った白い物質は、水に溶けやすく、フェノールフタレイン溶液で濃い赤色を示した。</li>\n    </ul>\n  </div>\n</div>","answerLabel":"二酸化炭素"},{"id":"t1q2","category":"化学変化・実験","prompt":"資料の実験で、青色の塩化コバルト紙を赤色に変えた物質は何か。","answer":["水","水分","H2O"],"points":5,"type":"text","explanation":"塩化コバルト紙は水に反応して青色から赤色へ変わります。","memory":"コバルト紙は「青から赤で水あり」。","compare":"text","material":"\n<div class=\"material-card\">\n  <div class=\"material-title\">資料：炭酸水素ナトリウムを加熱したときの変化</div>\n  <div class=\"flex-material\">\n    <div class=\"mini-diagram\">\n      <svg viewBox=\"0 0 340 180\" role=\"img\" aria-label=\"炭酸水素ナトリウムを加熱し、気体を石灰水に通す装置\">\n        <rect x=\"20\" y=\"130\" width=\"55\" height=\"12\" rx=\"3\" fill=\"#ddd\" stroke=\"#333\"/>\n        <path d=\"M45 128 L70 55 L235 55\" fill=\"none\" stroke=\"#333\" stroke-width=\"4\"/>\n        <rect x=\"82\" y=\"38\" width=\"105\" height=\"32\" rx=\"14\" fill=\"#fff\" stroke=\"#333\"/>\n        <text x=\"95\" y=\"59\" font-size=\"13\">NaHCO3</text>\n        <path d=\"M185 55 C230 50,230 96,260 96\" fill=\"none\" stroke=\"#333\" stroke-width=\"3\"/>\n        <rect x=\"255\" y=\"78\" width=\"45\" height=\"75\" fill=\"#fff\" stroke=\"#333\"/>\n        <rect x=\"258\" y=\"124\" width=\"39\" height=\"25\" fill=\"#dff\" stroke=\"none\"/>\n        <text x=\"257\" y=\"168\" font-size=\"12\">石灰水</text>\n        <path d=\"M103 92 q22 35 44 0\" stroke=\"#d66\" stroke-width=\"4\" fill=\"none\"/>\n        <text x=\"82\" y=\"115\" font-size=\"12\">加熱</text>\n        <text x=\"210\" y=\"42\" font-size=\"12\">発生した気体</text>\n      </svg>\n    </div>\n    <ul class=\"material-list\">\n      <li>気体を石灰水に通すと白くにごった。</li>\n      <li>試験管の口近くについた液体で青色の塩化コバルト紙が赤色に変化した。</li>\n      <li>加熱後に残った白い物質は、水に溶けやすく、フェノールフタレイン溶液で濃い赤色を示した。</li>\n    </ul>\n  </div>\n</div>","answerLabel":"水"},{"id":"t1q3","category":"化学変化・実験","prompt":"加熱後に残った白い物質は何か。","answer":["炭酸ナトリウム","Na2CO3"],"points":5,"type":"text","explanation":"炭酸水素ナトリウムを加熱すると、残る白い固体は炭酸ナトリウムです。","memory":"水素がぬけて、炭酸「ナトリウムだけ強め」。NaHCO3からHとCO2と水が出るイメージ。","compare":"text","material":"\n<div class=\"material-card\">\n  <div class=\"material-title\">資料：炭酸水素ナトリウムを加熱したときの変化</div>\n  <div class=\"flex-material\">\n    <div class=\"mini-diagram\">\n      <svg viewBox=\"0 0 340 180\" role=\"img\" aria-label=\"炭酸水素ナトリウムを加熱し、気体を石灰水に通す装置\">\n        <rect x=\"20\" y=\"130\" width=\"55\" height=\"12\" rx=\"3\" fill=\"#ddd\" stroke=\"#333\"/>\n        <path d=\"M45 128 L70 55 L235 55\" fill=\"none\" stroke=\"#333\" stroke-width=\"4\"/>\n        <rect x=\"82\" y=\"38\" width=\"105\" height=\"32\" rx=\"14\" fill=\"#fff\" stroke=\"#333\"/>\n        <text x=\"95\" y=\"59\" font-size=\"13\">NaHCO3</text>\n        <path d=\"M185 55 C230 50,230 96,260 96\" fill=\"none\" stroke=\"#333\" stroke-width=\"3\"/>\n        <rect x=\"255\" y=\"78\" width=\"45\" height=\"75\" fill=\"#fff\" stroke=\"#333\"/>\n        <rect x=\"258\" y=\"124\" width=\"39\" height=\"25\" fill=\"#dff\" stroke=\"none\"/>\n        <text x=\"257\" y=\"168\" font-size=\"12\">石灰水</text>\n        <path d=\"M103 92 q22 35 44 0\" stroke=\"#d66\" stroke-width=\"4\" fill=\"none\"/>\n        <text x=\"82\" y=\"115\" font-size=\"12\">加熱</text>\n        <text x=\"210\" y=\"42\" font-size=\"12\">発生した気体</text>\n      </svg>\n    </div>\n    <ul class=\"material-list\">\n      <li>気体を石灰水に通すと白くにごった。</li>\n      <li>試験管の口近くについた液体で青色の塩化コバルト紙が赤色に変化した。</li>\n      <li>加熱後に残った白い物質は、水に溶けやすく、フェノールフタレイン溶液で濃い赤色を示した。</li>\n    </ul>\n  </div>\n</div>","answerLabel":"炭酸ナトリウム"},{"id":"t1q4","category":"化学変化・実験","prompt":"1種類の物質が2種類以上の物質に分かれる化学変化を何というか。","answer":["分解"],"points":5,"type":"text","explanation":"1種類の物質が複数の物質に分かれる変化を分解といいます。加熱による分解は熱分解です。","memory":"「分けて解く」から分解。","compare":"text","answerLabel":"分解"},{"id":"t1q5","category":"化学変化・実験","prompt":"加熱によって起こる分解を特に何というか。","answer":["熱分解"],"points":5,"type":"text","explanation":"炭酸水素ナトリウムや酸化銀のように、加熱によって分解する変化を熱分解といいます。","memory":"熱で分かれる、熱分解。","compare":"text","answerLabel":"熱分解"},{"id":"t1q6","category":"化学変化・実験","prompt":"酸化銀を加熱したときに発生する気体は何か。","answer":["酸素","O2"],"points":5,"type":"text","explanation":"酸化銀を加熱すると、銀と酸素に分解します。酸素は火のついた線香を激しく燃やします。","memory":"酸化銀は「銀と酸素」にお別れ。","compare":"text","material":"\n<div class=\"material-card\">\n  <div class=\"material-title\">資料：酸化銀を加熱したときの変化</div>\n  <div class=\"flex-material\">\ function normalizeCommon(s){ return String(s ?? '').replace(/[０-９Ａ-Ｚａ-ｚ]/g, ch => String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/[₂]/g,'2').replace(/[₃]/g,'3').replace(/[₄]/g,'4').replace(/[₅]/g,'5').replace(/[₆]/g,'6').replace(/[₇]/g,'7').replace(/[₈]/g,'8').replace(/[₉]/g,'9').replace(/[₀]/g,'0').replace(/[－―ー–—]/g,'-').replace(/[→⇒]/g,'->').trim(); }

function normalizeFormula(s){ return normalizeCommon(s).replace(/[\s　]/g,'').replace(/→/g,'->'); }
function isCorrect(q, ans){
  if(q.type === 'multi'){
    const got = Array.isArray(ans) ? ans.slice().sort() : [];
    const exp = q.answer.slice().sort();
    return got.length===exp.length && got.every((v,i)=>v===exp[i]);
  }
  if(q.type === 'mcq') return ans === q.answer;
  const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
  if(q.compare === 'formula'){
    const got = normalizeFormula(ans);
    return answers.some(a => normalizeFormula(a) === got);
  }
  const got = normalizeText(ans);
  return answers.some(a => normalizeText(a) === got);
}

function renderQuestion(q, n, savedAnswers){
  const div=document.createElement('article'); div.className='question'; div.id=q.id;

  const materialHTML = q.material ? prepareMaterial(q) : '';

  div.innerHTML = `<div class="q-head"><span class="q-num">${n}</span><div><div><strong>${q.category}</strong>${hasMask?'<span class="mask-note">資料内の答えはマスク中</span>':''}</div><div class="q-meta">${q.points}点</div></div></div><div class="q-body">${materialHTML}<div class="q-prompt">${q.prompt}</div><div class="answer-area"></div><div class="result-line" data-result-for="${q.id}"></div></div>`;
  applyMasksToMaterial(div, q);
  const area = $('.answer-area', div);
  if(q.type==='mcq'){
    const opt=document.createElement('div'); opt.className='options';
    q.options.forEach((o,i)=>{
      const val = typeof o === 'string' ? o : o.v; const label = typeof o === 'string' ? o : o.label;
      const id=`${q.id}_${i}`;
      opt.insertAdjacentHTML('beforeend', `<label for="${id}"><input type="radio" name="${q.id}" id="${id}" value="${escapeAttr(val)}" ${saved===val?'checked':''}>${label}</label>`);
    });
    area.appendChild(opt);
  } else if(q.type==='multi'){
    const opt=document.createElement('div'); opt.className='options'; const arr=Array.isArray(saved)?saved:[];
    q.options.forEach((val,i)=>{
      const id=`${q.id}_${i}`;
      opt.insertAdjacentHTML('beforeend', `<label for="${id}"><input type="checkbox" name="${q.id}" id="${id}" value="${escapeAttr(val)}" ${arr.includes(val)?'checked':''}>${val}</label>`);
    });
    area.appendChild(opt);
  } else {
    area.innerHTML = `<input type="text" name="${q.id}" value="${escapeAttr(saved || '')}" placeholder="答えを入力">`;
  }
  return div;
}
function prepareMaterial(q){
  let html = q.material || '';
  if(q.maskHTML && q.maskHTML.length){
    q.maskHTML.forEach(item=>{
      const target = typeof item === 'string' ? item : item.html;
      const answer = typeof item === 'string' ? stripTags(item) : (item.answer || stripTags(item.html));
      if(!target) return;
      const replacement = `<span class="masked-answer" data-answer="${escapeAttr(answer)}">${escapeHTML(answer)}</span>`;
      html = html.split(target).join(replacement);
    });
  }
  return html;
}
function stripTags(html){ return String(html || '').replace(/<sub>/g,'').replace(/<\/sub>/g,'').replace(/<[^>]*>/g,''); }
function applyMasksToMaterial(root, q){
  const terms = (q.maskTerms || []).filter(Boolean).map(String).sort((a,b)=>b.length-a.length);
  if(!terms.length) return;
  root.querySelectorAll('.material-card').forEach(card=>maskTextNodes(card, terms));
}
function maskTextNodes(container, terms){
  const walker=document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {acceptNode(node){
    if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
    const p=node.parentElement;
    if(!p || p.closest('.masked-answer')) return NodeFilter.FILTER_REJECT;
    return terms.some(term=>node.nodeValue.includes(term)) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
  }});
  const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node=>maskOneTextNode(node, terms));
}
function maskOneTextNode(node, terms){
  const parent=node.parentElement;
  if(parent && parent.closest('svg')){
    if(!parent.dataset.original){ parent.dataset.original = parent.textContent; parent.dataset.answer = parent.textContent; }
    parent.textContent = '■■■';
    parent.classList.add('masked-svg-text');
    return;
  }
  const text=node.nodeValue;
  const frag=document.createDocumentFragment();
  let pos=0;
  while(pos<text.length){
    let found=null, index=-1;
    for(const term of terms){
      const i=text.indexOf(term,pos);
      if(i!==-1 && (index===-1 || i<index || (i===index && term.length>(found||'').length))){ index=i; found=term; }
    }
    if(found===null){ frag.appendChild(document.createTextNode(text.slice(pos))); break; }
    if(index>pos) frag.appendChild(document.createTextNode(text.slice(pos,index)));
    const span=document.createElement('span'); span.className='masked-answer'; span.dataset.answer=found; span.textContent=found; frag.appendChild(span);
    pos=index+found.length;
  }
  node.parentNode.replaceChild(frag,node);
}
function revealMaskedMaterials(scope){
  if(!scope) return;
  scope.classList.add('test-graded');
  scope.querySelectorAll('.masked-svg-text').forEach(el=>{
    if(el.dataset.original) el.textContent = el.dataset.original;
    el.classList.remove('masked-svg-text');
    el.classList.add('revealed-svg-text');
  });
}
function isAnswered(q, ans){
  if(q.type==='multi') return Array.isArray(ans) && ans.length>0;
  if(q.type==='mcq') return String(ans || '').trim() !== '';
  return String(ans || '').trim() !== '';
}
function showUnanswered(unanswered){
  document.querySelectorAll('.question.unanswered').forEach(el=>el.classList.remove('unanswered'));
  document.querySelectorAll('.result-line.unanswered').forEach(el=>{el.className='result-line'; el.innerHTML='';});
  unanswered.forEach(q=>{
    const article=document.getElementById(q.id); if(article) article.classList.add('unanswered');
    const res=document.querySelector(`[data-result-for="${q.id}"]`);
    if(res){ res.className='result-line unanswered'; res.innerHTML='未回答です。すべての問題に答えると採点できます。'; }
  });
  const first=document.getElementById(unanswered[0]?.id); if(first) first.scrollIntoView({behavior:'smooth', block:'center'});
}
function escapeAttr(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function bindInputs(test){
  $('#questions').addEventListener('input', (ev)=>{ saveCurrentAnswers(test); clearUnansweredMarker(ev.target); });
  $('#questions').addEventListener('change', (ev)=>{ saveCurrentAnswers(test); clearUnansweredMarker(ev.target); });
}
function clearUnansweredMarker(target){ const q=target?.closest?.('.question'); if(q){ q.classList.remove('unanswered'); const res=q.querySelector('.result-line.unanswered'); if(res){res.className='result-line'; res.innerHTML='';} } }
function collectAnswers(test){
  const answers={};
  for(const q of test.questions){
    if(q.type==='mcq'){
      const checked = $(`input[name="${q.id}"]:checked`);
      answers[q.id] = checked ? checked.value : '';
    } else if(q.type==='multi'){
      answers[q.id] = $all(`input[name="${q.id}"]:checked`).map(x=>x.value);
    } else {
      const inp = $(`input[name="${q.id}"]`);
      answers[q.id] = inp ? inp.value : '';
    }
  }
  return answers;
}
function saveCurrentAnswers(test){
  const pr=getProgress(); if(!pr[test.id]) pr[test.id]={answers:{}, timer:{remaining:TEST_TIME,running:false,lastSaved:Date.now()}};
  pr[test.id].answers = collectAnswers(test);
  if(timerState.testId===test.id) pr[test.id].timer = {remaining:timerState.remaining, running:timerState.running, lastSaved:Date.now()};
  setProgress(pr);
}
function setupTimer(testId, savedTimer){
  if(timerInterval){ clearInterval(timerInterval); timerInterval=null; }
  let remaining = TEST_TIME;
  let running = false;
  if(savedTimer){
    remaining = Number(savedTimer.remaining ?? TEST_TIME);
    running = Boolean(savedTimer.running);
    if(running && savedTimer.lastSaved){
      const diff = Math.floor((Date.now() - savedTimer.lastSaved)/1000);
      remaining = Math.max(0, remaining - diff);
    }
  }
  timerState = {testId, remaining, running:false, lastSaved:Date.now()};
  updateTimerDisplay();
  $('#startTimer').onclick=()=>startTimer();
  $('#pauseTimer').onclick=()=>pauseTimer();
  $('#resetTimer').onclick=()=>{ if(confirm('タイマーを30分に戻しますか？')){ timerState.remaining=TEST_TIME; timerState.running=false; clearInterval(timerInterval); timerInterval=null; updateTimerDisplay(); saveTimerState(); } };
  if(running && remaining>0) startTimer();
}
function startTimer(){ if(timerState.running || timerState.remaining<=0) return; timerState.running=true; timerState.lastSaved=Date.now(); timerInterval=setInterval(()=>{ timerState.remaining--; updateTimerDisplay(); if(timerState.remaining%5===0) saveTimerState(); if(timerState.remaining<=0){ timerState.remaining=0; pauseTimer(); alert('30分が終了しました。採点するか、見直しをしてから採点してください。'); } },1000); saveTimerState(); }
function pauseTimer(){ timerState.running=false; if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } saveTimerState(); updateTimerDisplay(); }
function saveTimerState(){ if(!timerState.testId) return; const pr=getProgress(); if(!pr[timerState.testId]) pr[timerState.testId]={answers:{}, timer:{}}; pr[timerState.testId].timer={remaining:timerState.remaining,running:timerState.running,lastSaved:Date.now()}; setProgress(pr); }
function updateTimerDisplay(){ const el=$('#timer'); if(!el) return; const m=Math.floor(timerState.remaining/60); const s=timerState.remaining%60; el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0'); el.classList.toggle('danger', timerState.remaining<=300); }
function gradeTest(test){
  saveCurrentAnswers(test); saveTimerState();
  const answers=collectAnswers(test);
  const unanswered=test.questions.filter(q=>!isAnswered(q, answers[q.id]));
  if(unanswered.length){
    showUnanswered(unanswered);
    alert(`未回答の問題が${unanswered.length}問あります。すべて回答してから採点してください。`);
    return;
  }
  const currentPanel = document.querySelector('#main .panel');
  revealMaskedMaterials(currentPanel);
  let score=0; const wrong=[]; const details=[];
  for(const q of test.questions){
    const ans=answers[q.id]; const ok=isCorrect(q, ans); if(ok) score += q.points; else wrong.push({qid:q.id, userAnswer:answerToText(ans), correct:q.answerLabel, explanation:q.explanation, memory:q.memory});
    details.push({q, ans, ok});
    const res=$(`[data-result-for="${q.id}"]`);
    if(res){ res.className='result-line '+(ok?'correct':'wrong'); res.innerHTML = ok ? `正解！ <strong>${q.answerLabel}</strong><br><span class="small">${q.explanation}</span>` : `不正解。あなたの答え：<strong>${escapeHTML(answerToText(ans))}</strong><br>正答：<strong>${q.answerLabel}</strong><br><span class="small">${q.explanation}<br>覚え方：${q.memory}</span>`; }
  }
  const elapsed = TEST_TIME - timerState.remaining;
  const result={id:cryptoRandomId(), testId:test.id, testTitle:test.title, date:new Date().toISOString(), score, total:100, elapsed, wrong};
  const results=getResults(); results.unshift(result); setResults(results.slice(0,100));
  const panel=$('#scorePanel'); panel.style.display='block';
  panel.innerHTML = `<div class="score-big">${score}/100点</div><div>間違い：${wrong.length}問 / 経過時間：${formatTime(elapsed)}</div><p>${score>=90?'すばらしい仕上がりです。細かい語句と反応式の表記を最後に確認しましょう。':score>=70?'合格ラインです。間違えた問題だけ復習すると得点が安定します。':'重要語句と資料問題を中心に、間違えた問題だけもう一度解き直しましょう。'}</p><div class="save-tools"><button class="btn primary" onclick="renderMistakes('latestTest','${test.id}')">この回の間違いだけ復習</button><button class="btn ghost" onclick="switchView('history')">採点履歴を見る</button></div>`;
  $('#jumpWrong').style.display = wrong.length ? 'inline-block' : 'none';
  panel.scrollIntoView({behavior:'smooth', block:'start'});
}
function escapeHTML(s){ return String(s ?? '').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function formatTime(sec){ const m=Math.floor(sec/60), s=sec%60; return `${m}分${s}秒`; }
function cryptoRandomId(){ try{ return crypto.randomUUID(); }catch(e){ return 'r_'+Date.now()+'_'+Math.random().toString(36).slice(2); } }
function renderHistory(){
  const app=$('#main'); const results=getResults();
  const panel=document.createElement('section'); panel.className='panel history-only';
  app.innerHTML=''; app.appendChild(panel);
  const rows=results.map(r=>`<div class="history-item"><div class="pill">${escapeHTML(r.testTitle)}</div><h3>${r.score}/${r.total}点</h3><div class="small">${new Date(r.date).toLocaleString()} / 経過 ${formatTime(r.elapsed||0)}</div><div>間違い：${r.wrong.length}問</div><div class="save-tools"><button class="btn primary" onclick="renderMistakes('result','${r.id}')">この結果の間違いを復習</button><button class="btn ghost" onclick="switchView('${r.testId}')">このテストへ戻る</button></div></div>`).join('');
  panel.innerHTML = `<h2>採点履歴・間違い復習</h2><p class="small">採点結果はこのブラウザ内に保存されます。端末を変える場合は、下のエクスポート機能で保存してください。</p><div class="save-tools"><button class="btn primary" onclick="renderMistakes('all')">過去の間違いをまとめて復習</button><button class="btn ghost" onclick="exportData()">学習データをエクスポート</button><button class="btn ghost" onclick="showImportBox()">学習データをインポート</button><button class="btn bad" onclick="clearResults()">採点履歴を消す</button></div><div id="backupBox"></div><h3>履歴</h3><div class="history-grid">${rows || '<div class="small">まだ採点履歴がありません。</div>'}</div><div id="mistakeArea"></div>`;
}
function renderMistakes(mode, key){
  if(active!=='history') { active='history'; renderNav(); renderHistory(); }
  const results=getResults(); let source=[]; let title='間違えた問題の復習';
  if(mode==='latestTest'){
    source = results.filter(r=>r.testId===key).slice(0,1).flatMap(r=>r.wrong.map(w=>({...w, testTitle:r.testTitle, date:r.date})));
    title = 'この回の間違いだけ復習';
  } else if(mode==='result'){
    const r=results.find(x=>x.id===key); source = r ? r.wrong.map(w=>({...w, testTitle:r.testTitle, date:r.date})) : [];
    title = r ? `${r.testTitle} の間違い復習` : title;
  } else {
    const map=new Map();
    results.forEach(r=>r.wrong.forEach(w=>{ if(!map.has(w.qid)) map.set(w.qid,{...w,testTitle:r.testTitle,date:r.date}); }));
    source=[...map.values()]; title='過去の間違いを重複なしで復習';
  }
  const area=$('#mistakeArea'); if(!area) return;
  const cards = source.map((w,i)=>{
    const found=findQuestion(w.qid); const q=found?.q;
    return `<div class="feedback-card bad-card"><div class="pill">${escapeHTML(w.testTitle || found?.test.title || '')}</div><h3>${i+1}. ${q ? q.prompt : w.qid}</h3>${q && q.material ? '<details class="test-graded"><summary>資料を表示</summary>'+prepareMaterial(q)+'</details>' : ''}<p>あなたの答え：<strong>${escapeHTML(w.userAnswer)}</strong></p><details><summary>正答・解説を表示</summary><p>正答：<strong>${escapeHTML(w.correct)}</strong></p><p>${escapeHTML(w.explanation)}</p><p><strong>覚え方：</strong>${escapeHTML(w.memory)}</p></details>${q ? `<div class="save-tools"><button class="btn ghost" onclick="switchView('${found.test.id}'); setTimeout(()=>document.getElementById('${w.qid}')?.scrollIntoView({behavior:'smooth'}),200)">元の問題へ移動</button></div>` : ''}</div>`;
  }).join('');
  area.innerHTML = `<hr><h2>${title}</h2>${source.length?cards:'<p class="small">復習する間違いはありません。</p>'}`;
  area.scrollIntoView({behavior:'smooth', block:'start'});
}
function exportData(){ const data={progress:getProgress(),results:getResults(),exportedAt:new Date().toISOString(),version:1}; const text=JSON.stringify(data,null,2); const box=$('#backupBox'); box.innerHTML=`<h3>エクスポートデータ</h3><textarea class="textarea-backup" readonly>${escapeHTML(text)}</textarea><p class="small">この文字列をコピーして保存してください。</p>`; }
function showImportBox(){ const box=$('#backupBox'); box.innerHTML=`<h3>インポート</h3><textarea class="textarea-backup" id="importText" placeholder="エクスポートしたJSONを貼り付け"></textarea><div class="save-tools"><button class="btn primary" onclick="importData()">読み込む</button></div>`; }
function importData(){ try{ const data=JSON.parse($('#importText').value); if(data.progress) setProgress(data.progress); if(data.results) setResults(data.results); alert('読み込みました。'); renderHistory(); }catch(e){ alert('読み込みに失敗しました。JSONの内容を確認してください。'); } }
function clearResults(){ if(confirm('採点履歴をすべて消しますか？途中回答は残ります。')){ setResults([]); renderHistory(); } }
window.addEventListener('beforeunload', ()=>{ saveTimerState(); });
function init(){ renderNav(); renderTest(active); updateSaveStatus('準備完了'); }
init();
</script>
