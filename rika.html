<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>理科 模擬テスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;min-height:100vh}
/* ── STICKY HEADER ── */
.stickybar{position:sticky;top:0;z-index:200;background:#0d1117;border-bottom:2px solid #21262d;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.stickybar-left{display:flex;align-items:center;gap:10px}
.timer{font-size:1.2em;font-weight:bold;color:#f0883e;min-width:56px}
.timer.warn{color:#ffa657}
.timer.danger{color:#f85149;animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.answered-count{font-size:.82em;color:#8b949e;white-space:nowrap}
.btn-submit-top{background:#238636;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:.88em;font-weight:bold;cursor:pointer;white-space:nowrap}
.btn-submit-top:hover{background:#2ea043}
.progress-chips{display:flex;flex-wrap:wrap;gap:3px;padding:6px 16px;background:#0d1117;border-bottom:1px solid #21262d}
.chip{width:22px;height:22px;border-radius:4px;background:#21262d;border:1px solid #30363d;font-size:.65em;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8b949e;transition:all .15s}
.chip.answered{background:#1f6feb44;border-color:#388bfd;color:#79c0ff}
.chip.unanswered-flash{animation:chipflash .4s 3}
@keyframes chipflash{0%,100%{background:#21262d}50%{background:#f8514966;border-color:#f85149}}
/* ── SCREENS ── */
.screen{display:none;max-width:760px;margin:0 auto;padding:16px}
/* ── HOME ── */
.home-title{font-size:1.6em;font-weight:bold;color:#58a6ff;text-align:center;padding:24px 0 8px}
.home-sub{text-align:center;color:#8b949e;font-size:.9em;margin-bottom:20px}
.range-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:16px;font-size:.88em;line-height:1.8;color:#8b949e}
.exam-btn{display:block;width:100%;background:#1f6feb;color:#fff;border:none;border-radius:9px;padding:15px 18px;font-size:1em;cursor:pointer;margin-bottom:10px;text-align:left;transition:background .2s;position:relative}
.exam-btn:hover{background:#388bfd}
.exam-btn.done{background:#1a3a1a;border:1px solid #2ea043}
.exam-btn.in-progress{background:#2a1a00;border:1px solid #d29922}
.exam-btn .badge{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:.8em;background:rgba(255,255,255,.15);padding:2px 10px;border-radius:10px}
.btn-danger{background:#21262d;color:#8b949e;border:1px solid #30363d;border-radius:8px;padding:10px 20px;font-size:.88em;cursor:pointer;display:block;width:100%;margin-top:8px}
.btn-danger:hover{background:#da363322;color:#f85149;border-color:#f85149}
/* ── EXAM ── */
.exam-wrap{padding-bottom:60px}
.q-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px;margin-bottom:16px;scroll-margin-top:100px}
.q-card.unanswered-hl{border-color:#f85149;box-shadow:0 0 0 2px #f8514944}
.q-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:.85em;font-weight:bold;color:#58a6ff}
.q-tag{font-size:.72em;padding:2px 8px;border-radius:10px;font-weight:bold}
.tag-c{background:#1f6feb22;color:#79c0ff;border:1px solid #1f6feb44}
.tag-j{background:#23863622;color:#3fb950;border:1px solid #23863644}
.q-text{font-size:.95em;line-height:1.7;color:#e6edf3;margin-bottom:12px}
.vbox{background:#0d1117;border:1px solid #21262d;border-radius:9px;padding:13px;margin-bottom:12px;overflow-x:auto}
.vbox svg{display:block;margin:0 auto}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.choices{grid-template-columns:1fr}}
.cho{background:#21262d;border:1.5px solid #30363d;color:#e6edf3;border-radius:8px;padding:10px 13px;text-align:left;cursor:pointer;font-size:.9em;line-height:1.4;transition:all .15s}
.cho:hover{border-color:#388bfd;background:#1f6feb18}
.cho.sel{border-color:#388bfd;background:#1f6feb28;color:#79c0ff}
.cho.ok{border-color:#2ea043;background:#23863622;color:#3fb950}
.cho.ng{border-color:#f85149;background:#f8514922;color:#f85149}
.cho:disabled{cursor:default}
.explanation{background:#0d1117;border-left:3px solid #388bfd;padding:10px 12px;margin-top:10px;font-size:.85em;line-height:1.6;color:#c9d1d9;border-radius:0 6px 6px 0}
/* ── TABLES ── */
.vis-tbl{border-collapse:collapse;width:100%;font-size:.84em}
.vis-tbl th{background:#1c2835;color:#79c0ff;border:1px solid #30363d;padding:6px 10px;text-align:center}
.vis-tbl td{border:1px solid #30363d;padding:6px 10px;text-align:center;color:#e6edf3}
.mask{background:#3a2a00;color:#ffd700;font-weight:800;text-align:center}
.mbox{display:inline-block;background:#3a2a00;border:1px solid #ffd700;color:#ffd700;font-weight:800;padding:1px 8px;border-radius:3px;font-size:.9em}
/* reaction equation */
.rxn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:1em;padding:8px 0;flex-wrap:wrap}
.rxnarrow{color:#58a6ff;font-size:1.1em}
.rxnplus{color:#8b949e}
/* ── RESULT ── */
.result-hero{text-align:center;padding:24px;background:#161b22;border-radius:14px;margin-bottom:16px}
.score-big{font-size:3.2em;font-weight:bold;color:#f0883e}
.score-lbl{color:#8b949e;font-size:.9em;margin-top:4px}
.score-msg{margin-top:12px;font-size:1em;font-weight:bold}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cat-bar-lbl{width:80px;font-size:.82em;color:#8b949e}
.cat-bar-bg{flex:1;background:#21262d;border-radius:4px;height:16px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .7s}
.cat-bar-pct{width:36px;font-size:.82em;text-align:right}
.btn{background:#238636;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:1em;cursor:pointer;display:block;width:100%;margin-top:10px}
.btn:hover{background:#2ea043}
.btn-sec{background:#21262d;color:#e6edf3;border:1px solid #30363d}
.btn-sec:hover{background:#30363d}
.sec-title{color:#f0883e;font-size:.95em;font-weight:bold;margin:20px 0 10px;border-bottom:1px solid #30363d;padding-bottom:6px}
.review-card{background:#161b22;border:1px solid #f8514944;border-radius:10px;padding:14px;margin-bottom:10px}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen" style="display:block">
  <div class="home-title">🔬 理科 模擬テスト</div>
  <p class="home-sub">1学期第1回テスト対策 ／ 30分 × 5回</p>
  <div class="range-card">
    <b style="color:#e6edf3">出題範囲</b><br>
    🧪 <b style="color:#79c0ff">2年生</b>：化学変化と原子・分子（p.138〜181）<br>
    　　物質の成り立ち・元素記号・化学式・化学反応式・酸化と燃焼<br>
    🌍 <b style="color:#3fb950">1年生</b>：地震（プレート・P波S波・震度・マグニチュード）
  </div>
  <div id="examList"></div>
  <button class="btn-danger" id="btnClearAll">🗑 全データをリセット</button>
</div>

<!-- EXAM -->
<div id="examScreen" style="display:none">
  <div class="stickybar">
    <div class="stickybar-left">
      <div class="timer" id="timerDisp">30:00</div>
      <div class="answered-count" id="answeredCount">0/25 回答</div>
    </div>
    <button class="btn-submit-top" id="btnSubmitTop">採点する ✓</button>
  </div>
  <div class="progress-chips" id="progressChips"></div>
  <div class="screen exam-wrap" id="examWrap" style="display:block;padding-top:8px">
    <div id="allQArea"></div>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <div class="result-hero">
    <div class="score-big" id="rScore">0</div>
    <div class="score-lbl">点（25問中 <span id="rCorrect">0</span>問正解）</div>
    <div class="score-msg" id="rMsg"></div>
  </div>
  <div id="catBars"></div>
  <button class="btn" id="btnGoReview">📖 間違えた問題を復習する</button>
  <button class="btn btn-sec" id="btnGoHome">🏠 ホームに戻る</button>
  <div id="reviewArea" style="display:none;margin-top:8px">
    <div class="sec-title">復習モード（不正解のみ）</div>
    <div id="reviewList"></div>
  </div>
</div>

<script>
// ============================================================
// VISUALS
// ============================================================
var V = {};

// 炭酸水素ナトリウム分解
V['nahco3'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">炭酸水素ナトリウムの熱分解</p><div class="rxn"><span>2NaHCO<sub>3</sub></span><span class="rxnarrow">→</span><span>Na<sub>2</sub>CO<sub>3</sub></span><span class="rxnplus">+</span><span class="mbox">【Ａ】</span><span class="rxnplus">+</span><span>H<sub>2</sub>O</span></div><p style="font-size:.78em;color:#8b949e;text-align:center;margin-top:6px">【Ａ】に当てはまる気体は何か</p></div>';

// 塩化コバルト紙
V['cobalt'] = '<div class="vbox"><table class="vis-tbl"><tr><th>試薬</th><th>乾燥時の色</th><th>水にふれると</th></tr><tr><td>塩化コバルト紙</td><td>青色</td><td class="mask">【Ａ】色</td></tr><tr><td>フェノールフタレイン</td><td>無色</td><td>アルカリ性→<span class="mbox">【Ｂ】</span>色</td></tr></table></div>';

// 水の電気分解
V['water_elec'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">水の電気分解</p><div class="rxn"><span>2H<sub>2</sub>O</span><span class="rxnarrow">→</span><span>2H<sub>2</sub></span><span class="rxnplus">+</span><span>O<sub>2</sub></span></div><table class="vis-tbl" style="margin-top:8px"><tr><th>極</th><th>発生気体</th><th>体積比</th></tr><tr><td>陰極（-）</td><td class="mask">【Ａ】</td><td>2</td></tr><tr><td>陽極（+）</td><td>酸素 O<sub>2</sub></td><td>1</td></tr></table></div>';

// 酸化銀の分解
V['ag2o'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">酸化銀の熱分解（係数を入れよ）</p><div class="rxn"><span class="mbox">【Ａ】</span><span>Ag<sub>2</sub>O</span><span class="rxnarrow">→</span><span>4Ag</span><span class="rxnplus">+</span><span>O<sub>2</sub></span></div></div>';

// 分子モデル（水分子）
V['water_model'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:6px">次の分子モデルは何を表すか</p><svg viewBox="0 0 160 80" width="160" height="80" xmlns="http://www.w3.org/2000/svg"><circle cx="80" cy="40" r="22" fill="#e05252" stroke="#fff" stroke-width="1.5"/><text x="80" y="46" fill="#fff" font-size="13" text-anchor="middle" font-weight="bold">O</text><circle cx="35" cy="55" r="14" fill="#4a90d9" stroke="#fff" stroke-width="1.5"/><text x="35" y="60" fill="#fff" font-size="11" text-anchor="middle" font-weight="bold">H</text><circle cx="125" cy="55" r="14" fill="#4a90d9" stroke="#fff" stroke-width="1.5"/><text x="125" y="60" fill="#fff" font-size="11" text-anchor="middle" font-weight="bold">H</text><line x1="58" y1="50" x2="46" y2="52" stroke="#ccc" stroke-width="2"/><line x1="102" y1="50" x2="114" y2="52" stroke="#ccc" stroke-width="2"/></svg></div>';

// 物質の分類図
V['bunrui'] = '<div class="vbox"><table class="vis-tbl"><tr><th>物質</th><th>分類</th></tr><tr><td>空気</td><td class="mask">【Ａ】</td></tr><tr><td>ダイヤモンド (C)</td><td>単体</td></tr><tr><td>食塩水</td><td class="mask">【Ｂ】</td></tr><tr><td>酸素 O<sub>2</sub></td><td>単体</td></tr><tr><td>水 H<sub>2</sub>O</td><td>化合物</td></tr></table></div>';

// 元素記号表
V['gensokigo'] = '<div class="vbox"><table class="vis-tbl"><tr><th>元素記号</th><th>元素名</th></tr><tr><td>H</td><td class="mask">【Ａ】</td></tr><tr><td>O</td><td>酸素</td></tr><tr><td class="mask">【Ｂ】</td><td>炭素</td></tr><tr><td>N</td><td>窒素</td></tr><tr><td>Na</td><td class="mask">【Ｃ】</td></tr><tr><td>Fe</td><td>鉄</td></tr><tr><td>Cu</td><td>銅</td></tr><tr><td>Ag</td><td class="mask">【Ｄ】</td></tr></table></div>';

// 化学式一覧
V['chemform'] = '<div class="vbox"><table class="vis-tbl"><tr><th>物質名</th><th>化学式</th></tr><tr><td>水</td><td class="mask">【Ａ】</td></tr><tr><td>水素</td><td>H<sub>2</sub></td></tr><tr><td>酸素</td><td class="mask">【Ｂ】</td></tr><tr><td>二酸化炭素</td><td>CO<sub>2</sub></td></tr><tr><td>アンモニア</td><td class="mask">【Ｃ】</td></tr><tr><td>塩化ナトリウム</td><td>NaCl</td></tr></table></div>';

// 鉄と硫黄の反応
V['fes'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">鉄と硫黄の加熱実験</p><div class="rxn"><span>Fe</span><span class="rxnplus">+</span><span>S</span><span class="rxnarrow">→</span><span class="mbox">【Ａ】</span></div><table class="vis-tbl" style="margin-top:8px"><tr><th>試験管</th><th>磁石</th><th>塩酸を加えると</th></tr><tr><td>加熱前（混合物）</td><td>つく</td><td class="mask">【Ｂ】</td></tr><tr><td>加熱後（硫化鉄）</td><td>つかない</td><td>硫化水素 (卵のにおい)</td></tr></table></div>';

// 銅の酸化
V['cu_oxide'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">銅の酸化</p><div class="rxn"><span>2Cu</span><span class="rxnplus">+</span><span>O<sub>2</sub></span><span class="rxnarrow">→</span><span class="mbox">【Ａ】</span></div><table class="vis-tbl" style="margin-top:8px"><tr><th>変化</th><th>加熱前</th><th>加熱後</th></tr><tr><td>色</td><td>赤褐色</td><td class="mask">【Ｂ】</td></tr><tr><td>質量</td><td>基準</td><td class="mask">【Ｃ】</td></tr></table></div>';

// 塩化銅の電気分解
V['cucl2'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">塩化銅水溶液の電気分解</p><div class="rxn"><span>CuCl<sub>2</sub></span><span class="rxnarrow">→</span><span class="mbox">【Ａ】</span><span class="rxnplus">+</span><span>Cl<sub>2</sub></span></div><table class="vis-tbl" style="margin-top:8px"><tr><th>極</th><th>生成物</th><th>色・性質</th></tr><tr><td>陰極</td><td class="mask">【Ａ】</td><td>赤色の金属</td></tr><tr><td>陽極</td><td>塩素</td><td class="mask">【Ｂ】</td></tr></table></div>';

// P波S波グラフ
V['pswave'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:6px">地震波の到達時間グラフ</p><svg viewBox="0 0 260 140" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:300px"><rect width="260" height="140" fill="#0d1117"/><line x1="30" y1="10" x2="30" y2="120" stroke="#30363d" stroke-width="1.5"/><line x1="30" y1="120" x2="250" y2="120" stroke="#30363d" stroke-width="1.5"/><text x="140" y="136" fill="#8b949e" font-size="9" text-anchor="middle">震源からの距離 (km)</text><text x="10" y="65" fill="#8b949e" font-size="9" text-anchor="middle" transform="rotate(-90,10,65)">時間(秒)</text><line x1="30" y1="110" x2="220" y2="35" stroke="#58a6ff" stroke-width="2.5"/><text x="225" y="33" fill="#58a6ff" font-size="11" font-weight="bold">P波</text><line x1="30" y1="110" x2="220" y2="55" stroke="#f85149" stroke-width="2.5"/><text x="225" y="53" fill="#f85149" font-size="11" font-weight="bold">S波</text><line x1="140" y1="70" x2="140" y2="90" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/><line x1="30" y1="70" x2="140" y2="70" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/><line x1="30" y1="90" x2="140" y2="90" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,2"/><text x="32" y="80" fill="#ffd700" font-size="9">初期微動</text><text x="32" y="89" fill="#ffd700" font-size="9">継続時間</text></svg></div>';

// 震度・マグニチュード比較
V['scale'] = '<div class="vbox"><table class="vis-tbl"><tr><th>用語</th><th>何を表す</th><th>値の数</th></tr><tr><td class="mask">【Ａ】</td><td>地震のエネルギー(規模)</td><td>1地震→1つの値</td></tr><tr><td>震度</td><td class="mask">【Ｂ】</td><td>観測地点ごとに異なる</td></tr></table><p style="font-size:.78em;color:#8b949e;margin-top:6px">震度は0〜7の10段階（5弱・5強・6弱・6強を含む）</p></div>';

// プレート模式図
V['plate'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:6px">日本付近のプレート</p><svg viewBox="0 0 260 120" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:300px"><rect width="260" height="120" fill="#0d1117"/><rect x="10" y="20" width="120" height="30" fill="#3a5a8a" rx="4"/><text x="70" y="40" fill="#79c0ff" font-size="10" text-anchor="middle">大陸プレート</text><rect x="10" y="60" width="100" height="25" fill="#1a3a1a" rx="4"/><text x="60" y="77" fill="#3fb950" font-size="9" text-anchor="middle">海洋プレート</text><polygon points="110,60 150,85 110,85" fill="#f85149" opacity=".7"/><text x="155" y="80" fill="#f85149" font-size="9">沈み込み</text><path d="M100,85 Q120,100 145,90" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="3,2"/><text x="148" y="100" fill="#ffd700" font-size="8">海溝</text><rect x="150" y="55" width="90" height="20" fill="#1a3a1a" rx="4"/><text x="195" y="68" fill="#3fb950" font-size="9" text-anchor="middle" class="mask">【沈み込む】</text><text x="195" y="105" fill="#8b949e" font-size="8" text-anchor="middle">海洋Pが大陸Pの下へ沈む→地震発生</text></svg></div>';

// 化学反応式 2H2+O2→2H2O
V['h2burn'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">水素の燃焼（化学反応式）</p><div class="rxn"><span>2H<sub>2</sub></span><span class="rxnplus">+</span><span>O<sub>2</sub></span><span class="rxnarrow">→</span><span class="mbox">【Ａ】</span></div><p style="font-size:.78em;color:#8b949e;text-align:center;margin-top:6px">【Ａ】に入る物質と係数は何か</p></div>';

// マグネシウム燃焼
V['mg_burn'] = '<div class="vbox"><p style="font-size:.8em;color:#8b949e;margin-bottom:8px">マグネシウムの燃焼</p><div class="rxn"><span class="mbox">【Ａ】</span><span>Mg</span><span class="rxnplus">+</span><span>O<sub>2</sub></span><span class="rxnarrow">→</span><span class="mbox">【Ｂ】</span><span>MgO</span></div></div>';

// 炭酸水素ナトリウム実験装置

// ============================================================
// STATE & STORAGE
// ============================================================
var state = {exam:null,answers:[],timerLeft:1800,timerIv:null,submitted:false,lastReview:null};
var SK = 'rikaExam2026v3';
function svSave(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function svLoad(){try{var s=localStorage.getItem(SK);return s?JSON.parse(s):{}}catch(e){return {};}}

// ============================================================
// HOME
// ============================================================
function initHome(){
  var stored=svLoad();
  var html='';
  for(var i=0;i<EXAMS.length;i++){
    var ex=EXAMS[i];
    var sd=stored['e'+ex.id]||{};
    var badge='',cls='';
    if(sd.submitted){badge='<span class="badge">✓ '+sd.score+'点</span>';cls='done';}
    else if(sd.answers&&sd.answers.some(function(a){return a!==null;})){
      var done=sd.answers.filter(function(a){return a!==null;}).length;
      badge='<span class="badge">途中 '+done+'/25</span>';cls='in-progress';
    }
    html+='<button class="exam-btn '+cls+'" data-id="'+ex.id+'"><b>'+ex.title+'</b><br><span style="font-size:.82em;opacity:.75">'+ex.sub+'</span>'+badge+'</button>';
  }
  document.getElementById('examList').innerHTML=html;
  var btns=document.getElementById('examList').querySelectorAll('button');
  for(var b=0;b<btns.length;b++){
    (function(btn){
      btn.addEventListener('click',function(){startExam(parseInt(btn.getAttribute('data-id'),10));});
    })(btns[b]);
  }
}
document.getElementById('btnClearAll').addEventListener('click',function(){
  if(!confirm('全保存データを消去しますか？')){return;}
  try{localStorage.removeItem(SK);}catch(e){}
  initHome();
});

// ============================================================
// START EXAM
// ============================================================
function startExam(id){
  var ex=null;
  for(var i=0;i<EXAMS.length;i++){if(EXAMS[i].id===id){ex=EXAMS[i];break;}}
  if(!ex)return;
  var stored=svLoad();
  var sd=stored['e'+id]||{};
  if(sd.submitted){
    if(!confirm('この回はすでに採点済みです。もう一度やり直しますか？')){
      restoreResult(id);return;
    }
    delete stored['e'+id];svSave(stored);sd={};
  }
  state.exam=ex;state.submitted=false;
  if(sd.answers&&sd.answers.length===ex.data.length){
    state.answers=sd.answers.slice();
    state.timerLeft=sd.tl!==undefined?sd.tl:1800;
  }else{
    state.answers=[];
    for(var j=0;j<ex.data.length;j++)state.answers.push(null);
    state.timerLeft=1800;
  }
  showScreen('examScreen');
  renderAllQ();
  startTimer();
}

// ============================================================
// RENDER ALL QUESTIONS
// ============================================================
function renderAllQ(){
  var ex=state.exam;
  var html='<h2 style="font-size:1em;color:#58a6ff;margin-bottom:14px;padding-top:4px">'+ex.title+' — '+ex.sub+'</h2>';
  for(var i=0;i<ex.data.length;i++){
    html+=buildQCard(i);
  }
  document.getElementById('allQArea').innerHTML=html;
  bindChoices();
  updateCountDisplay();
  updateChips();
}

function buildQCard(idx){
  var ex=state.exam;
  var q=ex.data[idx];
  var tag=q.t==='j'?'<span class="q-tag tag-j">🌍 地震</span>':'<span class="q-tag tag-c">🧪 化学</span>';
  var visHtml=q.v&&V[q.v]?V[q.v]:'';
  var cho='';
  var labels=['\u30A2','\u30A4','\u30A6','\u30A8'];
  for(var i=0;i<q.c.length;i++){
    var cls='cho';
    if(state.submitted){
      if(i===q.a)cls+=' ok';
      else if(state.answers[idx]===i)cls+=' ng';
    }else{
      if(state.answers[idx]===i)cls+=' sel';
    }
    var dis=state.submitted?' disabled':'';
    cho+='<button class="'+cls+'"'+dis+' data-qi="'+idx+'" data-ci="'+i+'">'+labels[i]+'　'+q.c[i]+'</button>';
  }
  var exp=state.submitted?'<div class="explanation">📝 <b>解説：</b>'+q.e+'</div>':'';
  var hlCls=(state.answers[idx]===null&&!state.submitted)?' unanswered-hl':'';
  return '<div class="q-card'+hlCls+'" id="qcard'+idx+'">'+
    '<div class="q-head"><span class="q-num">Q'+(idx+1)+'</span>'+tag+'</div>'+
    '<div class="q-text">'+q.q+'</div>'+
    visHtml+
    '<div class="choices" id="choicesBox'+idx+'">'+cho+'</div>'+
    exp+'</div>';
}

function bindChoices(){
  var ex=state.exam;
  for(var i=0;i<ex.data.length;i++){
    var box=document.getElementById('choicesBox'+i);
    if(!box)continue;
    var btns=box.querySelectorAll('button');
    for(var b=0;b<btns.length;b++){
      (function(btn){
        btn.addEventListener('click',function(){
          if(state.submitted)return;
          var qi=parseInt(btn.getAttribute('data-qi'),10);
          var ci=parseInt(btn.getAttribute('data-ci'),10);
          state.answers[qi]=ci;
          refreshQCard(qi);
          updateCountDisplay();
          updateChips();
          autoSave();
        });
      })(btns[b]);
    }
  }
}

function refreshQCard(idx){
  var el=document.getElementById('qcard'+idx);
  if(!el)return;
  var newHtml=buildQCard(idx);
  var tmp=document.createElement('div');
  tmp.innerHTML=newHtml;
  var newCard=tmp.firstChild;
  el.parentNode.replaceChild(newCard,el);
  var box=document.getElementById('choicesBox'+idx);
  if(box){
    var btns=box.querySelectorAll('button');
    for(var b=0;b<btns.length;b++){
      (function(btn){
        btn.addEventListener('click',function(){
          if(state.submitted)return;
          var qi=parseInt(btn.getAttribute('data-qi'),10);
          var ci=parseInt(btn.getAttribute('data-ci'),10);
          state.answers[qi]=ci;
          refreshQCard(qi);
          updateCountDisplay();
          updateChips();
          autoSave();
        });
      })(btns[b]);
    }
  }
}

function updateCountDisplay(){
  var answered=state.answers.filter(function(a){return a!==null;}).length;
  document.getElementById('answeredCount').textContent=answered+'/'+state.exam.data.length+' 回答';
}

function updateChips(){
  var ex=state.exam;
  var html='';
  for(var i=0;i<ex.data.length;i++){
    var cls='chip'+(state.answers[i]!==null?' answered':'');
    html+='<div class="'+cls+'" data-qi="'+i+'">'+(i+1)+'</div>';
  }
  document.getElementById('progressChips').innerHTML=html;
  var chips=document.getElementById('progressChips').querySelectorAll('.chip');
  for(var c=0;c<chips.length;c++){
    (function(chip){
      chip.addEventListener('click',function(){
        var qi=parseInt(chip.getAttribute('data-qi'),10);
        var el=document.getElementById('qcard'+qi);
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}
      });
    })(chips[c]);
  }
}

// SUBMIT
// ============================================================
document.getElementById('btnSubmitTop').addEventListener('click',function(){submitExam();});

function submitExam(){
  var ua=state.answers.filter(function(a){return a===null;}).length;
  if(ua>0){
    // 未回答問題へスクロール
    var firstUna=-1;
    for(var i=0;i<state.answers.length;i++){if(state.answers[i]===null){firstUna=i;break;}}
    if(!confirm('未回答が'+ua+'問あります。\nQ'+(firstUna+1)+'などに回答していません。\nこのまま採点しますか？\n（「OK」で採点、「キャンセル」で未回答問題へ移動）')){
      if(firstUna>=0){
        var el=document.getElementById('qcard'+firstUna);
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'});}
        flashChip(firstUna);
      }
      return;
    }
  }
  stopTimer();
  state.submitted=true;
  // 全カード再描画（採点結果表示）
  var ex=state.exam;
  for(var i=0;i<ex.data.length;i++){refreshQCard(i);}
  // 結果計算
  var cor=0,cc=0,ct=0,jc=0,jt=0;
  for(var i=0;i<ex.data.length;i++){
    var q=ex.data[i];
    var ok=(state.answers[i]===q.a)?1:0;
    if(q.t==='j'){jt++;jc+=ok;}else{ct++;cc+=ok;}
    cor+=ok;
  }
  var score=Math.round(cor/ex.data.length*100);
  var stored=svLoad();
  stored['e'+ex.id]={answers:state.answers.slice(),tl:state.timerLeft,submitted:true,score:score,cor:cor,cc:cc,ct:ct,jc:jc,jt:jt};
  svSave(stored);
  state.lastReview={ex:ex,answers:state.answers.slice()};
  renderResult(score,cor,cc,ct,jc,jt);
  showScreen('resultScreen');
}

function flashChip(idx){
  var chips=document.getElementById('progressChips').querySelectorAll('.chip');
  for(var c=0;c<chips.length;c++){
    if(parseInt(chips[c].getAttribute('data-qi'),10)===idx){
      chips[c].classList.add('unanswered-flash');
      (function(el){setTimeout(function(){el.classList.remove('unanswered-flash');},1500);})(chips[c]);
      break;
    }
  }
}

// ============================================================
// TIMER
// ============================================================
function startTimer(){
  stopTimer();
  updateTimerDisp();
  state.timerIv=setInterval(function(){
    state.timerLeft--;
    updateTimerDisp();
    if(state.timerLeft%30===0)autoSave();
    if(state.timerLeft<=0){stopTimer();alert('時間終了！採点します。');submitExam();}
  },1000);
}
function stopTimer(){if(state.timerIv){clearInterval(state.timerIv);state.timerIv=null;}}
function updateTimerDisp(){
  var m=Math.floor(state.timerLeft/60);
  var s=state.timerLeft%60;
  var el=document.getElementById('timerDisp');
  if(!el)return;
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.className='timer'+(state.timerLeft<=180?' danger':state.timerLeft<=600?' warn':'');
}

function autoSave(){
  if(!state.exam)return;
  var stored=svLoad();
  stored['e'+state.exam.id]={answers:state.answers.slice(),tl:state.timerLeft,submitted:false};
  svSave(stored);
}

// ============================================================
// RESULT
// ============================================================
function renderResult(score,cor,cc,ct,jc,jt){
  document.getElementById('rScore').textContent=score;
  document.getElementById('rCorrect').textContent=cor;
  var msg=score>=90?'🎉 すばらしい！ほぼ完璧です':score>=70?'👍 よくできました！もう少し':score>=50?'📖 半分以上正解！復習で差をつけよう':'💪 復習してもう一度挑戦しよう';
  var msgEl=document.getElementById('rMsg');
  msgEl.textContent=msg;
  msgEl.style.color=score>=70?'#3fb950':score>=50?'#ffa657':'#f85149';
  var cp=ct>0?Math.round(cc/ct*100):0;
  var jp=jt>0?Math.round(jc/jt*100):0;
  document.getElementById('catBars').innerHTML=
    '<div class="cat-bar-row"><div class="cat-bar-lbl">🧪 化学</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+cp+'%;background:#1f6feb"></div></div><div class="cat-bar-pct">'+cp+'%</div></div>'+
    '<div class="cat-bar-row"><div class="cat-bar-lbl">🌍 地震</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+jp+'%;background:#238636"></div></div><div class="cat-bar-pct">'+jp+'%</div></div>';
  document.getElementById('reviewArea').style.display='none';
}

function restoreResult(id){
  var stored=svLoad();
  var sd=stored['e'+id];
  if(!sd||!sd.submitted)return;
  var ex=null;
  for(var i=0;i<EXAMS.length;i++){if(EXAMS[i].id===id){ex=EXAMS[i];break;}}
  if(!ex)return;
  state.lastReview={ex:ex,answers:sd.answers};
  renderResult(sd.score,sd.cor,sd.cc,sd.ct,sd.jc,sd.jt);
  showScreen('resultScreen');
}

document.getElementById('btnGoReview').addEventListener('click',function(){
  var r=state.lastReview;if(!r)return;
  var ex=r.ex;var answers=r.answers;
  var html='';var wc=0;
  var labels=['\u30A2','\u30A4','\u30A6','\u30A8'];
  for(var i=0;i<ex.data.length;i++){
    var q=ex.data[i];
    if(answers[i]===q.a)continue;
    wc++;
    var visH=q.v&&V[q.v]?V[q.v]:'';
    var cho='';
    for(var j=0;j<q.c.length;j++){
      var col=j===q.a?'#3fb950':(j===answers[i]?'#f85149':'#8b949e');
      var mk=j===q.a?' ✅':(j===answers[i]?' ❌':'');
      cho+='<div style="font-size:.85em;padding:3px 0;color:'+col+'">'+labels[j]+'　'+q.c[j]+mk+'</div>';
    }
    var cat=q.t==='j'?'🌍 地震':'🧪 化学';
    html+='<div class="review-card">'+
      '<div style="font-size:.78em;color:#8b949e">Q'+(i+1)+' '+cat+'</div>'+
      '<div class="q-text" style="margin:6px 0;font-size:.92em">'+q.q+'</div>'+
      visH+cho+
      '<div class="explanation">📝 '+q.e+'</div></div>';
  }
  if(wc===0)html='<div style="text-align:center;padding:20px;color:#3fb950;font-size:1.1em">🎊 全問正解！すばらしい！</div>';
  document.getElementById('reviewList').innerHTML=html;
  var ra=document.getElementById('reviewArea');
  ra.style.display='block';
  ra.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btnGoHome').addEventListener('click',function(){
  stopTimer();state.exam=null;state.submitted=false;
  showScreen('homeScreen');initHome();
});

// ============================================================
// SCREEN SWITCH
// ============================================================
function showScreen(id){
  var ss=['homeScreen','examScreen','resultScreen'];
  for(var i=0;i<ss.length;i++){
    var el=document.getElementById(ss[i]);
    if(el){el.style.display=(ss[i]===id?'block':'none');}
  }
  window.scrollTo(0,0);
}

// ============================================================
// INIT
// ============================================================
initHome();
</script>
</body>
</html>
